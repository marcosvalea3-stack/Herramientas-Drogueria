<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplicador de Precios</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f7;color:#1a1a2e;min-height:100vh}

.header{background:#1a2744;color:white;padding:14px 24px;display:flex;align-items:center;gap:12px}
.header-text h1{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.header-text p{font-size:12px;opacity:0.6;margin-top:1px}
.pill{background:#f59e0b;color:#1a1a2e;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-left:auto}

/* UPLOAD */
.upload-screen{max-width:680px;margin:44px auto;padding:0 20px}
.upload-title{text-align:center;margin-bottom:28px}
.upload-title h2{font-size:22px;font-weight:700;color:#1a2744;margin-bottom:6px}
.upload-title p{font-size:14px;color:#64748b}

.upload-card{background:white;border-radius:14px;border:2px dashed #cbd5e1;padding:36px 24px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;margin-bottom:20px}
.upload-card:hover{border-color:#f59e0b;background:#fffdf5}
.upload-card.loaded{border:2px solid #22c55e;background:#f0fdf4}
.upload-card.dragover{border-color:#f59e0b;background:#fffdf5;transform:scale(1.01)}
.upload-card input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2}
.upload-icon{font-size:42px;margin-bottom:12px}
.upload-card h3{font-size:15px;font-weight:600;color:#374151;margin-bottom:6px}
.upload-card p{font-size:13px;color:#94a3b8;line-height:1.5}
.file-loaded{font-size:13px;color:#16a34a;font-weight:500;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:5px}

.process-btn{display:block;width:100%;padding:14px;background:#1a2744;color:white;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.15s}
.process-btn:hover:not(:disabled){background:#2d3f6e}
.process-btn:disabled{background:#94a3b8;cursor:not-allowed}
.tip{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;font-size:12px;color:#92400e;margin-top:12px;display:flex;gap:8px}

/* LOADING */
.loading-screen{max-width:460px;margin:80px auto;text-align:center;padding:20px}
.loading-screen h2{font-size:18px;font-weight:600;margin-bottom:8px;color:#1a2744}
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:20px}
.progress-fill{height:100%;background:linear-gradient(90deg,#f59e0b,#ef4444);border-radius:3px}

/* MAIN */
.main{padding:16px 20px;max-width:1340px;margin:0 auto}

.toolbar{background:white;border-radius:10px;border:1px solid #e2e8f0;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.toolbar-group{display:flex;align-items:center;gap:8px}
.toolbar-label{font-size:12px;font-weight:600;color:#64748b;white-space:nowrap;text-transform:uppercase;letter-spacing:0.4px}
.pct-input{width:80px;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:14px;font-weight:600;color:#1a2744;outline:none;text-align:center;transition:border-color 0.15s}
.pct-input:focus{border-color:#f59e0b}
.pct-suffix{font-size:14px;color:#64748b;font-weight:500}
.apply-btn{padding:7px 16px;background:#f59e0b;color:white;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;transition:background 0.15s;white-space:nowrap}
.apply-btn:hover{background:#d97706}
.reset-small-btn{padding:6px 12px;background:white;color:#64748b;border:1px solid #d1d5db;border-radius:7px;font-size:12px;cursor:pointer;transition:all 0.15s}
.reset-small-btn:hover{background:#fee2e2;color:#991b1b;border-color:#fca5a5}

.divider{width:1px;height:32px;background:#e2e8f0;flex-shrink:0}

.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:700px){.stats-bar{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:white;border-radius:10px;padding:12px 16px;border:1px solid #e2e8f0}
.stat-card .num{font-size:20px;font-weight:700}
.stat-card .lbl{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:0.4px;margin-top:2px}
.stat-card.blue .num{color:#2563eb}
.stat-card.green .num{color:#16a34a}
.stat-card.amber .num{color:#d97706}
.stat-card.purple .num{color:#7c3aed}

.section{background:white;border-radius:10px;border:1px solid #e2e8f0;overflow:hidden}
.section-header{padding:12px 18px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px}
.section-header h2{font-size:13px;font-weight:600;flex:1}
.search-input{padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;outline:none;width:200px}
.search-input:focus{border-color:#f59e0b}
.filter-btns{display:flex;gap:4px}
.filt-btn{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #e2e8f0;background:white;color:#64748b;font-weight:500;transition:all 0.1s}
.filt-btn.active{background:#1a2744;color:white;border-color:#1a2744}

table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:#94a3b8;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-weight:600;white-space:nowrap}
th.right{text-align:right}
td{padding:8px 12px;border-bottom:1px solid #f8fafc;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fffdf5}

.med-name{color:#374151;font-weight:500;font-size:12px;line-height:1.4}
.med-cat{font-size:10px;color:#94a3b8;margin-top:1px}
.item-num{font-size:11px;color:#94a3b8;font-weight:600}

.price-cell{text-align:right;font-family:monospace;font-size:13px}
.price-orig{color:#64748b}
.price-new{color:#16a34a;font-weight:600}
.price-zero{color:#cbd5e1}
.pct-tag{display:inline-block;padding:2px 7px;border-radius:12px;font-size:11px;font-weight:600}
.pct-global{background:#fef3c7;color:#92400e}
.pct-custom{background:#dbeafe;color:#1e40af}
.pct-none{background:#f1f5f9;color:#94a3b8}

.ind-pct-wrap{display:flex;align-items:center;gap:4px;justify-content:flex-end}
.ind-pct{width:62px;padding:4px 6px;border:1.5px solid #e2e8f0;border-radius:5px;font-size:12px;font-weight:600;text-align:center;outline:none;transition:border-color 0.15s;background:white}
.ind-pct:focus{border-color:#f59e0b;background:#fffdf5}
.ind-pct.has-value{border-color:#3b82f6;background:#eff6ff;color:#1e40af}
.ind-apply{padding:3px 8px;background:#3b82f6;color:white;border:none;border-radius:5px;font-size:11px;cursor:pointer;font-weight:600;transition:background 0.1s}
.ind-apply:hover{background:#2563eb}
.clear-ind{padding:3px 6px;background:none;border:1px solid #e2e8f0;color:#94a3b8;border-radius:5px;font-size:11px;cursor:pointer}
.clear-ind:hover{border-color:#ef4444;color:#ef4444}

.diff-badge{font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px}
.diff-pos{background:#dcfce7;color:#166534}
.diff-none{color:#94a3b8}

.export-bar{display:flex;align-items:center;padding:14px 18px;gap:10px;border-top:1px solid #e2e8f0;background:#f8fafc;flex-wrap:wrap}
.export-info{flex:1;font-size:13px;color:#64748b;min-width:200px}
.export-info strong{color:#374151}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;transition:all 0.15s;border:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:#1a2744;color:white}
.btn-primary:hover{background:#2d3f6e}
.btn-secondary{background:white;color:#374151;border:1px solid #d1d5db}
.btn-secondary:hover{background:#f9fafb}
.btn-danger{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.btn-danger:hover{background:#fecaca}
</style>
</head>
<body>

<div class="header">
  <div class="header-text">
    <h1>Aplicador de Precios</h1>
    <p>Carga tu cotización y aplicá márgenes por medicamento</p>
  </div>
  <span class="pill">% por ítem</span>
</div>

<div id="root"></div>

<script>
var state = {
  screen: 'upload',
  fileName: '',
  fileData: null,
  rawRows: [],        // {excelRow, item, cantidad, precioOrig, detalle, cat}
  pcts: {},           // itemKey -> {global: bool, value: number}
  globalPct: 0,
  searchFilter: '',
  filterMode: 'all',  // all | withprice | noprice
};

// ── READ FILE ──────────────────────────────────────────────────────────────────
function readExcel(ab) {
  var wb = XLSX.read(ab, {type:'array'});
  var ws = wb.Sheets[wb.SheetNames[0]];
  var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
  var items = [];
  for (var i = 1; i < rows.length; i++) {
    var r = rows[i];
    var item = r[2], cant = r[3], precio = r[4], det = r[6];
    if (item !== null && det !== null && String(item).trim() !== '') {
      var p = parseFloat(precio) || 0;
      var parts = String(det).trim().split(' - ');
      items.push({
        excelRow: i + 1,
        item: parseInt(item),
        cantidad: parseFloat(cant) || 0,
        precioOrig: p,
        detalle: String(det).trim(),
        name: parts.length > 1 ? parts.slice(1).join(' - ') : String(det).trim(),
        cat: parts.length > 1 ? parts[0] : '',
      });
    }
  }
  return items;
}

function readPDF(ab) {
  // PDF support via text extraction - parse price tables from text
  // Returns empty — handled client-side with a message
  return null;
}

// ── COMPUTED ───────────────────────────────────────────────────────────────────
function getPct(row) {
  var k = row.item;
  if (state.pcts[k] !== undefined) return {type:'custom', value: state.pcts[k]};
  if (state.globalPct > 0) return {type:'global', value: state.globalPct};
  return {type:'none', value: 0};
}

function computeNewPrice(row) {
  var p = getPct(row);
  if (!row.precioOrig || row.precioOrig === 0) return 0;
  return row.precioOrig * (1 + p.value / 100);
}

function formatARS(n) {
  if (!n || n === 0) return '—';
  return '$\u202f' + n.toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function totalOrig() {
  return state.rawRows.reduce(function(s,r){return s + r.precioOrig * r.cantidad}, 0);
}
function totalNew() {
  return state.rawRows.reduce(function(s,r){return s + computeNewPrice(r) * r.cantidad}, 0);
}
function countWithPrice() {
  return state.rawRows.filter(function(r){return r.precioOrig > 0}).length;
}
function countWithPct() {
  return state.rawRows.filter(function(r){return getPct(r).type !== 'none' && r.precioOrig > 0}).length;
}

// ── EXPORT ─────────────────────────────────────────────────────────────────────
function exportXLSX() {
  var wb = XLSX.read(state.fileData, {type:'array'});
  var ws = wb.Sheets[wb.SheetNames[0]];
  var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});

  // Update col E (P. Unitario) with new prices
  state.rawRows.forEach(function(row) {
    var newP = computeNewPrice(row);
    if (newP > 0 && row.precioOrig > 0) {
      var cellRef = XLSX.utils.encode_cell({r: row.excelRow - 1, c: 4});
      if (!ws[cellRef]) ws[cellRef] = {};
      ws[cellRef].v = parseFloat(newP.toFixed(2));
      ws[cellRef].t = 'n';
      ws[cellRef].z = '"$"#,##0.00';
    }
  });

  XLSX.writeFile(wb, 'Cotizacion_Con_Margenes.xlsx');
}

function exportSummary() {
  var data = [['Item','Descripción','Categoría','Cantidad','P. Original','% Aplicado','P. Con Margen','Importe Con Margen']];
  state.rawRows.forEach(function(r) {
    var p = getPct(r);
    var newP = computeNewPrice(r);
    data.push([
      r.item, r.name, r.cat, r.cantidad,
      r.precioOrig || 0,
      p.value ? p.value + '%' + (p.type==='custom'?' (individual)':' (general)') : 'sin %',
      parseFloat((newP||0).toFixed(2)),
      parseFloat(((newP||0)*r.cantidad).toFixed(2))
    ]);
  });
  var wb2 = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb2, XLSX.utils.aoa_to_sheet(data), 'Resumen');
  XLSX.writeFile(wb2, 'Resumen_Margenes.xlsx');
}

// ── ACTIONS ────────────────────────────────────────────────────────────────────
function applyGlobal() {
  var v = parseFloat(document.getElementById('global-pct').value);
  if (isNaN(v) || v < 0) return;
  state.globalPct = v;
  render();
}

function applyIndividual(itemKey) {
  var inp = document.getElementById('ind-'+itemKey);
  if (!inp) return;
  var v = parseFloat(inp.value);
  if (isNaN(v) || v < 0) {
    if (inp.value === '' || inp.value === null) { clearIndividual(itemKey); return; }
    return;
  }
  state.pcts[itemKey] = v;
  render();
}

function clearIndividual(itemKey) {
  delete state.pcts[itemKey];
  render();
}

function clearAllCustom() {
  state.pcts = {};
  render();
}

function handleFile(file) {
  if (!file) return;
  var ext = file.name.split('.').pop().toLowerCase();
  var reader = new FileReader();
  reader.onload = function(e) {
    var ab = e.target.result;
    state.fileData = ab;
    state.fileName = file.name;
    if (ext === 'pdf') {
      alert('Los archivos PDF aún no están soportados de forma nativa en el navegador. Por favor subí el archivo en formato .xlsx o .xls.');
      state.fileData = null; state.fileName = '';
    } else {
      try {
        var rows = readExcel(ab);
        if (!rows.length) { alert('No se encontraron medicamentos en el archivo.'); state.fileData=null; state.fileName=''; }
        else { state.rawRows = rows; }
      } catch(e2) { alert('Error al leer el archivo: '+e2.message); state.fileData=null; state.fileName=''; }
    }
    render();
  };
  reader.readAsArrayBuffer(file);
}

function startResults() {
  state.screen = 'results';
  state.globalPct = 0;
  state.pcts = {};
  state.searchFilter = '';
  state.filterMode = 'all';
  render();
}

function resetApp() {
  state.screen='upload'; state.fileName=''; state.fileData=null;
  state.rawRows=[]; state.pcts={}; state.globalPct=0;
  render();
}

// ── RENDER UPLOAD ─────────────────────────────────────────────────────────────
function renderUpload() {
  var loaded = !!state.fileData;
  document.getElementById('root').innerHTML =
    '<div class="upload-screen">' +
    '<div class="upload-title"><h2>Aplicador de márgenes</h2>' +
    '<p>Cargá tu archivo de cotización con precios y aplicá % de ganancia por ítem</p></div>' +

    '<div class="upload-card '+(loaded?'loaded':'')+'" ' +
    'ondragover="event.preventDefault();this.classList.add(\'dragover\')" ' +
    'ondragleave="this.classList.remove(\'dragover\')" ' +
    'ondrop="event.preventDefault();this.classList.remove(\'dragover\');handleFile(event.dataTransfer.files[0])">' +
    '<input type="file" accept=".xlsx,.xls" onchange="handleFile(this.files[0])">' +
    '<div class="upload-icon">'+(loaded?'✅':'📊')+'</div>' +
    '<h3>'+(loaded?'Archivo cargado':'Subir cotización con precios')+'</h3>' +
    '<p>'+(loaded?state.fileName:'Arrastrá o hacé click para seleccionar<br><span style="font-size:11px;opacity:0.7">Formatos: .xlsx · .xls</span>')+'</p>' +
    (loaded ? '<div class="file-loaded">'+state.rawRows.length+' medicamentos encontrados</div>' : '') +
    '</div>' +

    '<button class="process-btn" onclick="startResults()" '+(loaded?'':'disabled')+'>' +
    (loaded ? '⚡ Abrir editor de márgenes' : 'Cargá un archivo para continuar') +
    '</button>' +
    (loaded ? '<div class="tip">💡 <span>Todo se procesa en tu navegador. Ningún dato se envía a servidores.</span></div>' : '') +
    '</div>';
}

// ── RENDER RESULTS ────────────────────────────────────────────────────────────
function renderResults() {
  var rows = state.rawRows;
  var filtered = rows.filter(function(r) {
    if (state.filterMode === 'withprice' && r.precioOrig <= 0) return false;
    if (state.filterMode === 'noprice' && r.precioOrig > 0) return false;
    if (state.searchFilter) {
      var q = state.searchFilter.toLowerCase();
      return r.detalle.toLowerCase().indexOf(q) >= 0;
    }
    return true;
  });

  var to = totalOrig(), tn = totalNew();
  var cwp = countWithPrice(), cwpct = countWithPct();
  var diffPct = to > 0 ? ((tn-to)/to*100).toFixed(1) : 0;

  var tableRows = '';
  filtered.forEach(function(r) {
    var p = getPct(r);
    var newP = computeNewPrice(r);
    var hasPrice = r.precioOrig > 0;
    var pctTagClass = p.type==='custom'?'pct-custom': p.type==='global'?'pct-global':'pct-none';
    var pctTagLabel = p.type==='custom'?p.value+'% ★': p.type==='global'?p.value+'%':'sin %';
    var hasCustom = state.pcts[r.item] !== undefined;
    var indVal = hasCustom ? state.pcts[r.item] : '';

    tableRows +=
      '<tr>' +
      '<td><span class="item-num">#'+r.item+'</span></td>' +
      '<td><div class="med-name">'+r.name+'</div><div class="med-cat">'+r.cat+'</div></td>' +
      '<td class="price-cell"><span class="'+(hasPrice?'price-orig':'price-zero')+'">'+formatARS(r.precioOrig)+'</span></td>' +
      '<td class="price-cell">'+(hasPrice?'<span class="price-new">'+formatARS(newP)+'</span>':'<span class="price-zero">—</span>')+'</td>' +
      '<td class="price-cell">'+(hasPrice&&r.cantidad?'<span style="color:#7c3aed;font-weight:600">'+formatARS(newP*r.cantidad)+'</span>':'<span class="price-zero">—</span>')+'</td>' +
      '<td><span class="pct-tag '+pctTagClass+'">'+pctTagLabel+'</span></td>' +
      '<td>' +
        '<div class="ind-pct-wrap">' +
        '<input class="ind-pct'+(hasCustom?' has-value':'')+'" id="ind-'+r.item+'" type="number" min="0" step="0.5" placeholder="%" value="'+indVal+'" ' +
        'onkeydown="if(event.key===\'Enter\'){applyIndividual('+r.item+')}" ' +
        'oninput="var el=document.getElementById(\'ind-'+r.item+'\');el.classList.toggle(\'has-value\',this.value!==\'\')">' +
        '<button class="ind-apply" onclick="applyIndividual('+r.item+')">OK</button>' +
        (hasCustom?'<button class="clear-ind" onclick="clearIndividual('+r.item+')" title="Quitar %">✕</button>':'') +
        '</div>' +
      '</td>' +
      '</tr>';
  });

  document.getElementById('root').innerHTML =
    '<div class="main">' +

    // TOOLBAR
    '<div class="toolbar">' +
    '<div class="toolbar-group">' +
    '<span class="toolbar-label">% General</span>' +
    '<input id="global-pct" class="pct-input" type="number" min="0" step="0.5" placeholder="0" value="'+(state.globalPct||'')+'" onkeydown="if(event.key===\'Enter\')applyGlobal()">' +
    '<span class="pct-suffix">%</span>' +
    '<button class="apply-btn" onclick="applyGlobal()">Aplicar a todos</button>' +
    '</div>' +
    '<div class="divider"></div>' +
    '<div class="toolbar-group" style="gap:6px">' +
    '<span class="toolbar-label">Customizados:</span>' +
    '<span style="font-size:13px;font-weight:600;color:#3b82f6">'+Object.keys(state.pcts).length+'</span>' +
    (Object.keys(state.pcts).length>0?'<button class="reset-small-btn" onclick="clearAllCustom()">Limpiar individuales</button>':'') +
    '</div>' +
    '<div class="divider"></div>' +
    '<div class="toolbar-group">' +
    '<input class="search-input" type="text" placeholder="🔍 Buscar..." oninput="state.searchFilter=this.value;render()" value="'+state.searchFilter+'">' +
    '<div class="filter-btns">' +
    '<button class="filt-btn '+(state.filterMode==='all'?'active':'')+'" onclick="state.filterMode=\'all\';render()">Todos</button>' +
    '<button class="filt-btn '+(state.filterMode==='withprice'?'active':'')+'" onclick="state.filterMode=\'withprice\';render()">Con precio</button>' +
    '<button class="filt-btn '+(state.filterMode==='noprice'?'active':'')+'" onclick="state.filterMode=\'noprice\';render()">Sin precio</button>' +
    '</div>' +
    '</div>' +
    '</div>' +

    // STATS
    '<div class="stats-bar">' +
    '<div class="stat-card blue"><div class="num">'+rows.length+'</div><div class="lbl">Total ítems</div></div>' +
    '<div class="stat-card green"><div class="num">'+cwp+'</div><div class="lbl">Con precio</div></div>' +
    '<div class="stat-card amber"><div class="num">'+cwpct+'</div><div class="lbl">Con % aplicado</div></div>' +
    '<div class="stat-card purple"><div class="num">'+(to>0?formatARS(tn):'$—')+'</div><div class="lbl">Total con margen</div></div>' +
    '</div>' +

    // TABLE
    '<div class="section">' +
    '<div class="section-header">' +
    '<h2>Medicamentos — '+filtered.length+' mostrando</h2>' +
    '</div>' +
    '<div style="overflow-x:auto">' +
    '<table><thead><tr>' +
    '<th style="width:50px">Item</th>' +
    '<th>Detalle</th>' +
    '<th class="right">P. Original</th>' +
    '<th class="right">P. Con Margen</th>' +
    '<th class="right">Importe Total</th>' +
    '<th style="width:90px">% Activo</th>' +
    '<th style="width:160px;text-align:right">% Individual</th>' +
    '</tr></thead>' +
    '<tbody>'+tableRows+'</tbody>' +
    '</table>' +
    '</div>' +

    // EXPORT BAR
    '<div class="export-bar">' +
    '<div class="export-info">' +
    'Total original: <strong>'+formatARS(to)+'</strong>' +
    (to>0?' → <strong style="color:#16a34a">'+formatARS(tn)+'</strong> <span class="diff-badge diff-pos">+'+diffPct+'%</span>':'') +
    '</div>' +
    '<button class="btn btn-danger" onclick="resetApp()">↩ Nuevo archivo</button>' +
    '<button class="btn btn-secondary" onclick="exportSummary()">📋 Exportar resumen</button>' +
    '<button class="btn btn-primary" onclick="exportXLSX()">⬇ Exportar con márgenes (.xlsx)</button>' +
    '</div>' +
    '</div>' + // section
    '</div>'; // main
}

function render() {
  if (state.screen==='upload') renderUpload();
  else renderResults();
}

render();
</script>
</body>
</html>
